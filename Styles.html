  * {
    box-sizing: border-box;
  }

  html, body {
    margin: 0;
    min-height: 100%;
    font-family: "Segoe UI", "Trebuchet MS", sans-serif;
    color: var(--ink);
    background:
      radial-gradient(circle at top left, rgba(28, 126, 214, 0.12), transparent 24%),
      radial-gradient(circle at bottom right, rgba(15, 118, 110, 0.10), transparent 22%),
      linear-gradient(180deg, var(--bg-soft) 0%, var(--bg) 100%);
  }

  body {
    min-height: 100vh;
  }

  button,
  input,
  select,
  textarea {
    font: inherit;
  }

  html {
    -webkit-text-size-adjust: 100%;
  }

  * {
    box-sizing: border-box;
  }

  button {
    cursor: pointer;
  }

  body {
    overflow-x: hidden;
  }

  .shell {
    width: min(1280px, calc(100% - 80px));
    margin: 32px auto 36px;
    display: grid;
    grid-template-columns: 260px minmax(0, 1fr);
    gap: 22px;
  }

  .topbar {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 18px;
    padding: 20px 24px;
    border: 1px solid rgba(217, 227, 238, 0.9);
    border-radius: var(--radius-xl);
    background: var(--panel);
    box-shadow: var(--shadow);
    backdrop-filter: blur(14px);
  }

  .brand-button {
    display: inline-flex;
    align-items: center;
    gap: 16px;
    border: none;
    background: transparent;
    color: var(--ink);
    padding: 0;
  }

  .brand-mark {
    width: 58px;
    height: 58px;
    border-radius: 18px;
    overflow: hidden;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #f8fbff, #e7f1fb);
    color: var(--brand-dark);
    font-weight: 800;
    letter-spacing: 0.08em;
    border: 1px solid var(--line);
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.7);
  }

  .brand-mark img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .brand-text strong,
  .brand-text span {
    display: block;
  }

  .brand-text strong {
    font-size: 1.9rem;
    line-height: 1.02;
    letter-spacing: -0.03em;
  }

  .brand-text span {
    color: var(--muted);
    font-size: 1rem;
    margin-top: 3px;
  }

  .dashboard {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 12px;
    flex: 1;
    flex-wrap: wrap;
  }

  .help-trigger {
    min-width: 110px;
    min-height: 58px;
    padding: 16px 26px;
    border: 1px solid rgba(199, 213, 228, 0.95);
    background: linear-gradient(180deg, #ffffff 0%, #f7fbff 52%, #f2f8ff 100%);
    color: var(--brand-dark);
    box-shadow:
      0 12px 26px rgba(16, 32, 58, 0.08),
      inset 0 1px 0 rgba(255, 255, 255, 0.96);
  }

  .help-trigger:hover {
    background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
    border-color: #b6cee7;
    box-shadow:
      0 14px 30px rgba(16, 32, 58, 0.10),
      inset 0 1px 0 rgba(255, 255, 255, 0.96);
  }

  .help-trigger:active {
    background: linear-gradient(180deg, #eef5fd 0%, #e3eefb 100%);
    border-color: #b6cee7;
    box-shadow:
      inset 0 2px 8px rgba(15, 23, 42, 0.10),
      0 6px 14px rgba(16, 32, 58, 0.06);
  }

  .settings-trigger {
    min-width: 146px;
    min-height: 58px;
    padding: 16px 26px;
    border: 1px solid rgba(199, 213, 228, 0.95);
    background: linear-gradient(180deg, #ffffff 0%, #f7fbff 52%, #f2f8ff 100%);
    color: var(--brand-dark);
    box-shadow:
      0 12px 26px rgba(16, 32, 58, 0.08),
      inset 0 1px 0 rgba(255, 255, 255, 0.96);
  }

  .settings-trigger:hover {
    background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
    border-color: #b6cee7;
    box-shadow:
      0 14px 30px rgba(16, 32, 58, 0.10),
      inset 0 1px 0 rgba(255, 255, 255, 0.96);
  }

  .settings-trigger:active {
    background: linear-gradient(180deg, #eef5fd 0%, #e3eefb 100%);
    border-color: #b6cee7;
    box-shadow:
      inset 0 2px 8px rgba(15, 23, 42, 0.10),
      0 6px 14px rgba(16, 32, 58, 0.06);
  }

  .start-trigger {
    min-width: 124px;
    min-height: 58px;
    padding: 16px 26px;
    border-radius: 999px;
    box-shadow: 0 14px 28px rgba(59, 130, 246, 0.24);
  }

  .field label {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    margin: 0;
    font-size: 0.84rem;
    font-weight: 700;
    color: #56708c;
    text-transform: none;
    letter-spacing: 0.01em;
    pointer-events: none;
    padding: 8px 12px;
    border-radius: 999px;
    background: linear-gradient(180deg, #f8fbff 0%, #eef5fd 100%);
    border: 1px solid rgba(199, 213, 228, 0.92);
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.95);
    z-index: 1;
  }

  .field {
    position: relative;
    min-width: 168px;
    overflow: hidden;
    border-radius: 999px;
  }

  .field.custom-dropdown {
    overflow: visible;
  }

  .field.hidden {
    display: none !important;
  }

  .field::before {
    content: "";
    position: absolute;
    inset: 6px;
    border-radius: 999px;
    background: linear-gradient(135deg, rgba(28, 126, 214, 0.08), rgba(15, 118, 110, 0.04));
    box-shadow:
      inset -58px 0 0 rgba(234, 244, 255, 0.6),
      inset -59px 0 0 rgba(191, 214, 238, 0.85);
    opacity: 0;
    transition: opacity 0.18s ease;
    pointer-events: none;
  }

  .field select,
  .dropdown-trigger,
  .field input,
  .task-textarea,
  .task-input {
    width: 100%;
    min-height: 58px;
    border: 1px solid rgba(199, 213, 228, 0.95);
    border-radius: 999px;
    background:
      linear-gradient(180deg, #ffffff 0%, #f7fbff 52%, #f2f8ff 100%);
    color: var(--ink);
    padding: 16px 52px 16px 102px;
    outline: none;
    transition: border-color 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease, background 0.18s ease;
    appearance: none;
    font-weight: 700;
    font-size: 1rem;
    line-height: 1.2;
    box-shadow:
      0 12px 26px rgba(16, 32, 58, 0.08),
      inset 0 1px 0 rgba(255, 255, 255, 0.96);
  }

  .dropdown-trigger {
    text-align: left;
  }

  .field select,
  .dropdown-trigger {
    cursor: pointer;
    padding-right: 64px;
    background-image:
      linear-gradient(180deg, #ffffff 0%, #f7fbff 52%, #f2f8ff 100%),
      linear-gradient(180deg, rgba(191, 214, 238, 0.72) 0%, rgba(191, 214, 238, 0.72) 100%);
    background-size: 100% 100%, 1px calc(100% - 12px);
    background-position: left top, right 56px center;
    background-repeat: no-repeat;
    background-clip: padding-box;
  }

  .field::after {
    content: "";
    position: absolute;
    right: 20px;
    top: 50%;
    width: 11px;
    height: 11px;
    border-right: 2px solid #5f7d99;
    border-bottom: 2px solid #5f7d99;
    transform: translateY(-72%) rotate(45deg);
    pointer-events: none;
