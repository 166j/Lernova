  function getEffectiveClassLevel() {
    return APP_STATE.classLevel;
  }

  function getTopicsForSubject(subjectKey, classLevelOverride) {
    const config = SUBJECT_CONFIG[subjectKey];
    if (!config) {
      return {};
    }
    const effectiveClassLevel = String(classLevelOverride || getEffectiveClassLevel());
    if (config.topicsByClass) {
      return config.topicsByClass[effectiveClassLevel] || config.topicsByClass['5'] || config.topicsByClass['7'] || config.topicsByClass['9'] || {};
    }
    return config.topics || {};
  }

  function getCurrentSubjectConfig(classLevelOverride) {
    const config = SUBJECT_CONFIG[APP_STATE.subject];
    return {
      label: config.label,
      description: config.description,
      topics: getTopicsForSubject(APP_STATE.subject, classLevelOverride)
    };
  }

  function getCurrentTopicConfig() {
    const subjectConfig = getCurrentSubjectConfig();
    return subjectConfig.topics[APP_STATE.topic] || null;
  }

  function getCurrentSubtopics() {
    const topicConfig = getCurrentTopicConfig();
    return topicConfig && topicConfig.subtopics ? topicConfig.subtopics : null;
  }

  function syncSelectedTopic() {
    const topics = getCurrentSubjectConfig().topics;
    if (!topics[APP_STATE.topic]) {
      APP_STATE.topic = Object.keys(topics)[0] || '';
    }
  }

  function handleBrandImageError() {
    const mark = document.getElementById('brandMark');
    mark.innerHTML = 'LN';
  }

  function setActiveView(viewId) {
    APP_STATE.activeView = viewId;
    document.getElementById('homeView').classList.toggle('hidden', viewId !== 'homeView');
    document.getElementById('tasksView').classList.toggle('hidden', viewId !== 'tasksView');
    document.getElementById('tipsView').classList.toggle('hidden', viewId !== 'tipsView');
    document.getElementById('testView').classList.toggle('hidden', viewId !== 'testView');
    document.getElementById('classesView').classList.toggle('hidden', viewId !== 'classesView');
    document.getElementById('profileView').classList.toggle('hidden', viewId !== 'profileView');
    const classesTrigger = document.getElementById('classesTrigger');
    const profileTrigger = document.getElementById('profileTrigger');
    const testTabButton = document.getElementById('testTabButton');
    if (classesTrigger) {
      classesTrigger.classList.toggle('active', viewId === 'classesView');
    }
    if (profileTrigger) {
      profileTrigger.classList.toggle('active', viewId === 'profileView');
    }
    if (testTabButton) {
      testTabButton.classList.toggle('active', viewId === 'testView');
    }
  }

  function setClassLevel(value) {
    APP_STATE.classLevel = String(value || '5');
    APP_STATE.openDropdown = '';
    resetTestState();
    syncSelectedTopic();
    syncSelectedSubtopic();
    renderClassButtons();
    renderDashboard();
    renderSubjectCards();
    updateLabels();
  }

  function setSubject(value) {
    APP_STATE.subject = value || 'mathe';
    APP_STATE.openDropdown = '';
    resetTestState();
    const topics = getCurrentSubjectConfig().topics;
    APP_STATE.topic = Object.keys(topics)[0];
    APP_STATE.subtopic = '';
    syncSelectedSubtopic();
    renderDashboard();
    renderSubjectCards();
    updateLabels();
  }

  function setTopic(value) {
    APP_STATE.topic = value;
    APP_STATE.subtopic = '';
    APP_STATE.openDropdown = '';
    resetTestState();
    syncSelectedSubtopic();
    renderDashboard();
    updateLabels();
  }

  function setSubtopic(value) {
    APP_STATE.subtopic = value || '';
    APP_STATE.openDropdown = '';
    resetTestState();
    renderDashboard();
    updateLabels();
  }

  function resetTestState() {
    APP_STATE.testLoading = false;
    APP_STATE.testTasks = [];
    APP_STATE.test.submitted = false;
    APP_STATE.test.result = null;
  }

  function syncSelectedSubtopic() {
    const subtopics = getCurrentSubtopics();
    if (!subtopics) {
      APP_STATE.subtopic = '';
      return;
    }
    if (!APP_STATE.subtopic || !subtopics[APP_STATE.subtopic]) {
      APP_STATE.subtopic = Object.keys(subtopics)[0];
    }
  }

  function getSelectedSubtopicLabel() {
    const subtopics = getCurrentSubtopics();
    if (!subtopics || !APP_STATE.subtopic || !subtopics[APP_STATE.subtopic]) {
      return '';
    }
    return subtopics[APP_STATE.subtopic].label;
  }

  function renderClassButtons() {
    const classList = document.getElementById('classList');
    const classes = ['5', '6', '7', '8', '9', '10'];

    classList.innerHTML = classes.map((classLevel) => {
      const active = APP_STATE.classLevel === classLevel ? 'active' : '';
      return '<button class="' + active + '" data-class-level="' + classLevel + '" onclick="setClassLevel(\'' + classLevel + '\')">Klasse ' + classLevel + '</button>';
    }).join('');

    renderCustomDropdown('classDropdown', classes.map(function(classLevel) {
      return { value: classLevel, label: 'Klasse ' + classLevel };
    }), APP_STATE.classLevel, 'setClassLevel');
  }

  function renderSubjectDropdown() {
    renderCustomDropdown('subjectDropdown', SUBJECT_ORDER.map(function(key) {
      return { value: key, label: SUBJECT_CONFIG[key].label, className: SUBJECT_DROPDOWN_CLASSES[key] || '' };
    }), APP_STATE.subject, 'setSubject');
  }

  function renderTopicDropdown() {
    const topics = getCurrentSubjectConfig().topics;
    renderCustomDropdown('topicDropdown', Object.keys(topics).map(function(key) {
      return { value: key, label: topics[key].label };
    }), APP_STATE.topic, 'setTopic');
  }

  function renderSubtopicDropdown() {
    const wrap = document.getElementById('subtopicDropdownWrap');
    const subtopics = getCurrentSubtopics();

    if (!subtopics) {
      wrap.classList.add('hidden');
      if (APP_STATE.openDropdown === 'subtopicDropdown') {
        APP_STATE.openDropdown = '';
      }
      return;
    }

    wrap.classList.remove('hidden');
    renderCustomDropdown('subtopicDropdown', Object.keys(subtopics).map(function(key) {
      return { value: key, label: subtopics[key].label };
    }), APP_STATE.subtopic, 'setSubtopic');
  }

  function renderCustomDropdown(dropdownId, options, selectedValue, onSelectName) {
    const menu = document.getElementById(dropdownId);
    const trigger = document.getElementById(dropdownId + 'Button');
    const field = document.getElementById(dropdownId + 'Field') || document.getElementById(dropdownId + 'Wrap');
    const selectedOption = options.find(function(option) {
      return option.value === selectedValue;
    }) || options[0] || { label: '', value: '' };
    const isOpen = APP_STATE.openDropdown === dropdownId;

    if (trigger) {
      trigger.innerHTML = '<span class="dropdown-trigger-text">' + escapeHtml(selectedOption.label) + '</span>';
      trigger.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
    }

    if (menu) {
      menu.innerHTML = options.map(function(option) {
        const active = option.value === selectedValue ? ' active' : '';
        const extraClass = option.className ? ' ' + option.className : '';
        return '<button type="button" class="dropdown-option' + extraClass + active + '" onclick="' + onSelectName + '(\'' + escapeJs(option.value) + '\')">' + escapeHtml(option.label) + '</button>';
      }).join('');
    }

    if (field) {
      field.classList.toggle('open', isOpen);
    }
  }

  function toggleDropdown(dropdownId) {
    APP_STATE.openDropdown = APP_STATE.openDropdown === dropdownId ? '' : dropdownId;
    renderDashboard();
  }

  function renderDashboard() {
    renderClassButtons();
    renderSubjectDropdown();
    renderTopicDropdown();
    renderSubtopicDropdown();
  }

  function renderSubjectCards() {
    const cardRoot = document.getElementById('subjectCards');
    const effectiveClass = getEffectiveClassLevel();
    cardRoot.innerHTML = SUBJECT_ORDER.map((key) => {
      const subject = {
        label: SUBJECT_CONFIG[key].label,
        description: getCardDescriptionForSubject(key, effectiveClass),
        topics: getTopicsForCards(key, effectiveClass)
      };
      const active = APP_STATE.subject === key ? ' active' : '';
      const topicChips = Object.keys(subject.topics).map(function(topicKey) {
        return '<span class="topic-chip">' + escapeHtml(subject.topics[topicKey].label) + '</span>';
      }).join('');
      const cardActions = key === 'religion_ethik'
        ? '' +
          '<button class="start-button" onclick="activateSubjectTopicAndOpenTasks(\'religion_ethik\', \'katholisch\')">Katholisch</button>' +
          '<button class="tips-button" onclick="activateSubjectTopicAndOpenTasks(\'religion_ethik\', \'evangelisch\')">Evangelisch</button>' +
          '<button class="choose-button" onclick="activateSubjectTopicAndOpenTasks(\'religion_ethik\', \'philosophie\')">Philosophie / Ethik</button>' +
          '<button class="religion-select-button" onclick="activateSubject(\'religion_ethik\')">Nur Fach wählen</button>'
        : '' +
          '<button class="start-button" onclick="activateSubjectAndOpenTasks(\'' + key + '\')">Aufgaben starten</button>' +
          '<button class="tips-button" onclick="activateSubjectAndOpenTips(\'' + key + '\')">Tipps ansehen</button>' +
          '<button class="choose-button" onclick="activateSubject(\'' + key + '\')">Fach wählen</button>';
      return '' +
        '<article class="subject-card subject-' + key + active + '" data-subject-key="' + key + '">' +
        '<h3>' + escapeHtml(subject.label) + '</h3>' +
        '<p>' + escapeHtml(subject.description) + '</p>' +
        '<div class="topic-chip-row">' + topicChips + '</div>' +
        '<div class="card-actions">' +
        cardActions +
        '</div>' +
        '</article>';
    }).join('');
  }

    return getTopicsForSubject(subjectKey, classLevelOverride);
  }

    const effectiveClassLevel = String(classLevelOverride || getEffectiveClassLevel());
    if (subjectKey === 'deutsch') {

    if (subjectKey === 'biologie') {
      return 'Biologie-Inhalte passend zum NRW-Lehrplan für Klasse ' + effectiveClassLevel + '.';
    }
    if (SUBJECT_CONFIG[subjectKey].topicsByClass) {
      return SUBJECT_CONFIG[subjectKey].label + '-Inhalte passend zur Klassenstufe ' + effectiveClassLevel + '.';
    }
    return SUBJECT_CONFIG[subjectKey].description;

  function syncModalScrollLock() {
    const hasOpenModal = !document.getElementById('settingsOverlay').classList.contains('hidden')
      || !document.getElementById('helpChatOverlay').classList.contains('hidden');
    setBodyScrollLock(hasOpenModal);
  }

  function setBodyScrollLock(shouldLock) {
    const body = document.body;
    const currentOffset = body.dataset.scrollLockY || '0';

    if (shouldLock) {
      if (!body.classList.contains('modal-open')) {
        body.dataset.scrollLockY = String(window.scrollY || window.pageYOffset || 0);
        body.style.top = '-' + body.dataset.scrollLockY + 'px';
      }
      body.classList.add('modal-open');
      return;
    }

    body.classList.remove('modal-open');
    body.style.top = '';
    delete body.dataset.scrollLockY;
    window.scrollTo(0, Math.abs(parseInt(currentOffset, 10) || 0));
  }

  function updateHelpContext() {
    const subjectConfig = getCurrentSubjectConfig();
    const topicConfig = getCurrentTopicConfig();
    const subtopicLabel = getSelectedSubtopicLabel();
    const context = [
      'Klasse ' + APP_STATE.classLevel,
      subjectConfig.label,
      topicConfig ? topicConfig.label : ''
    ];

    if (subtopicLabel) {
      context.push(subtopicLabel);
    }

    if (APP_STATE.helpTaskIndex !== null && APP_STATE.tasks[APP_STATE.helpTaskIndex]) {
      context.push('Aufgabe ' + (APP_STATE.helpTaskIndex + 1));
    }

    document.getElementById('helpChatContext').textContent = 'Aktueller Lernkontext: ' + context.filter(Boolean).join(' · ');
  }

  function appendHelpMessage(role, text) {
    const messages = document.getElementById('helpChatMessages');
    const author = role === 'user' ? 'Du' : 'Lernova Hilfe';
    const className = role === 'user' ? 'chat-message user' : 'chat-message bot';
    const node = document.createElement('div');
    node.className = className;
    node.innerHTML = '<strong>' + escapeHtml(author) + '</strong><p>' + escapeHtml(text) + '</p>';
    messages.appendChild(node);
    messages.scrollTop = messages.scrollHeight;
  }

  function renderHelpChatHistory() {
    const messages = document.getElementById('helpChatMessages');
    messages.innerHTML = '';
    const history = APP_STATE.progress.profile && Array.isArray(APP_STATE.progress.profile.chatHistory)
      ? APP_STATE.progress.profile.chatHistory
      : [];

    history.forEach(function(entry) {
      appendHelpMessage(entry.role === 'assistant' ? 'bot' : 'user', entry.text || '');
    });
  }

  function setHelpLoading(isLoading) {
    APP_STATE.helpLoading = isLoading;
    const button = document.getElementById('helpChatSendButton');
    button.disabled = isLoading;
    button.textContent = isLoading ? 'Wird gesendet ...' : 'Frage senden';
  }

  function sendHelpMessage() {
    if (!ensureAuthenticated()) {
      return;
    }

    if (APP_STATE.helpLoading) {
      return;
    }

    const input = document.getElementById('helpChatInput');
    const message = input.value.trim();
    if (!message) {
      return;
    }

    if (!APP_STATE.progress.profile) {
      APP_STATE.progress.profile = { chatHistory: [] };
    }
    if (!Array.isArray(APP_STATE.progress.profile.chatHistory)) {
      APP_STATE.progress.profile.chatHistory = [];
    }
    APP_STATE.progress.profile.chatHistory.push({ role: 'user', text: message });
    APP_STATE.progress.profile.chatHistory = APP_STATE.progress.profile.chatHistory.slice(-5);
    appendHelpMessage('user', message);
    input.value = '';
    setHelpLoading(true);

    google.script.run
      .withSuccessHandler(function(responseText) {
        setHelpLoading(false);
        if (!APP_STATE.progress.profile) {
          APP_STATE.progress.profile = { chatHistory: [] };
        }
        APP_STATE.progress.profile.chatHistory.push({ role: 'assistant', text: responseText });
        APP_STATE.progress.profile.chatHistory = APP_STATE.progress.profile.chatHistory.slice(-5);
        appendHelpMessage('bot', responseText);
      })
      .withFailureHandler(function(error) {
        setHelpLoading(false);
        if (error && /anmeldung|erneut anmelden|abgelaufen/i.test(error.message || '')) {
          handleAuthFailure(error, 'Die Anmeldung ist abgelaufen.');
          return;
        }
        appendHelpMessage('bot', 'Die Hilfe konnte gerade nicht antworten. ' + (error && error.message ? error.message : 'Bitte versuche es später erneut.'));
      })
      .getLernovaHilfe({
        authToken: APP_STATE.auth.token,
        klasse: APP_STATE.classLevel,
        fach: getCurrentSubjectConfig().label,
        thema: getCurrentTopicConfig() ? getCurrentTopicConfig().label : '',
        unterthema: getSelectedSubtopicLabel(),
        message: message,
        aktuelleAufgabe: getCurrentHelpTaskText(),
        aktuelleAntwort: getCurrentHelpTaskAnswer()
      });
  }

  function handleHelpChatKeydown(event) {
    if (!APP_STATE.settings.enterSendsChat) {
      return;
    }

    if (event.key !== 'Enter' || event.shiftKey) {
      return;
    }

    event.preventDefault();
    sendHelpMessage();
  }

  function getCurrentHelpTaskText() {
    if (APP_STATE.helpTaskIndex === null || !APP_STATE.tasks[APP_STATE.helpTaskIndex]) {
      return '';
    }

    const task = APP_STATE.tasks[APP_STATE.helpTaskIndex];
    return task.frage || '';
  }

  function getCurrentHelpTaskAnswer() {
    if (APP_STATE.helpTaskIndex === null || !APP_STATE.tasks[APP_STATE.helpTaskIndex]) {
      return '';
    }

    const answer = getTaskAnswer(APP_STATE.helpTaskIndex);
    if (typeof answer === 'string') {
      return answer;
    }
    return '';
  }

  function loadTasks() {
    if (!ensureAuthenticated()) {
      return;
    }

    const requestedTaskCount = Math.min(Math.max(parseInt(APP_STATE.settings.taskCount, 10) || 5, 1), 20);

    APP_STATE.loading = true;
    renderTasks();
    google.script.run
      .withSuccessHandler(function(tasks) {
        APP_STATE.loading = false;
        APP_STATE.tasks = Array.isArray(tasks) ? tasks : [];
        APP_STATE.taskResults = [];
        renderTasks();
      })
      .withFailureHandler(function(error) {
        APP_STATE.loading = false;
        APP_STATE.tasks = [];
        if (error && /anmeldung|erneut anmelden|abgelaufen/i.test(error.message || '')) {
          handleAuthFailure(error, 'Die Anmeldung ist abgelaufen.');
          return;
        }
        document.getElementById('tasksPanel').innerHTML =
          '<div class="empty-state">Die Aufgaben konnten nicht geladen werden. ' + escapeHtml(error && error.message ? error.message : 'Bitte versuche es erneut.') + '</div>';
      })
      .getTasks(APP_STATE.auth.token, APP_STATE.subject, APP_STATE.topic, APP_STATE.classLevel, requestedTaskCount, APP_STATE.subtopic || '');
  }

  function loadTest() {
    if (!ensureAuthenticated()) {
      return;
    }

    APP_STATE.testLoading = true;
    APP_STATE.testTasks = [];
    APP_STATE.test.submitted = false;
    APP_STATE.test.result = null;
    renderTest();

    google.script.run
      .withSuccessHandler(function(tasks) {
        APP_STATE.testLoading = false;
        APP_STATE.testTasks = Array.isArray(tasks) ? tasks : [];
        renderTest();
      })
      .withFailureHandler(function(error) {
        APP_STATE.testLoading = false;
        APP_STATE.testTasks = [];
        if (error && /anmeldung|erneut anmelden|abgelaufen/i.test(error.message || '')) {
          handleAuthFailure(error, 'Die Anmeldung ist abgelaufen.');
          return;
        }
        document.getElementById('testPanel').innerHTML =
          '<div class="empty-state">Der Test konnte nicht geladen werden. ' + escapeHtml(error && error.message ? error.message : 'Bitte versuche es erneut.') + '</div>';
      })
      .getTestTasks(APP_STATE.auth.token, APP_STATE.subject, APP_STATE.topic, APP_STATE.classLevel, APP_STATE.subtopic || '');
  }

  function renderTasks() {
    const panel = document.getElementById('tasksPanel');
    renderPlayerProfile();
    if (APP_STATE.loading) {
      panel.innerHTML = '<div class="loading-state">Passende Aufgaben werden geladen ...</div>';
      return;
    }

    if (!APP_STATE.tasks.length) {
      panel.innerHTML = '<div class="empty-state">Noch keine Aufgaben geladen. Öffne ein Thema über das Dashboard.</div>';
      return;
    }

    panel.innerHTML = '<div class="task-stack">' + APP_STATE.tasks.map(function(task, index) {
      const storedResult = APP_STATE.taskResults[index];
      const isCheckLocked = !!(storedResult && storedResult.locked);
      return '' +
        '<article class="task-card" data-task-index="' + index + '">' +
        '<h3>Aufgabe ' + (index + 1) + '</h3>' +
        '<p>' + escapeHtml(task.frage || '') + '</p>' +
        renderTaskInput(task, index) +
        '<div class="task-actions">' +
        '<button class="primary-button" onclick="checkTask(' + index + ')"' + (isCheckLocked ? ' disabled' : '') + '>Prüfen</button>' +
        '<button class="ghost-button" onclick="showSolution(' + index + ')">Lösung zeigen</button>' +
        '<button class="ghost-button" onclick="openHelpChatForTask(' + index + ')">Hilfe</button>' +
        '</div>' +
        '<div class="result' + (storedResult ? ' ' + escapeHtml(storedResult.className || '') : '') + '" id="taskResult' + index + '">' + (storedResult ? escapeHtml(storedResult.message || '') : '') + '</div>' +
        '</article>';
    }).join('') + '</div>';
  }

  function renderPlayerProfile() {
    const profile = APP_STATE.progress.profile || (APP_STATE.auth.user && APP_STATE.auth.user.profile) || null;
    const headline = document.getElementById('profileHeadline');
    const summary = document.getElementById('profileSummary');
    const xp = document.getElementById('profileXp');
    const level = document.getElementById('profileLevel');
    const streak = document.getElementById('profileStreak');
    const accuracy = document.getElementById('profileAccuracy');
    const progressBar = document.getElementById('profileProgressBar');
    const progressLabel = document.getElementById('profileProgressLabel');
    const badges = document.getElementById('profileBadges');

    if (!headline) {
      return;
    }

    if (!profile) {
      headline.textContent = 'Level 1 startet';
      summary.textContent = 'Sammle XP, halte deine Streak und schalte Badges frei.';
      xp.textContent = '0';
      level.textContent = '1';
      streak.textContent = '0';
      accuracy.textContent = '0 %';
      progressBar.style.width = '0%';
      progressLabel.textContent = '0 % bis Level 2 · 50 XP fehlen';
      badges.innerHTML = '<span class="badge-pill">Noch keine Badges</span>';
      return;
    }

    const total = profile.stats && profile.stats.total ? profile.stats.total : 0;
    const correct = profile.stats && profile.stats.correct ? profile.stats.correct : 0;
    const percent = total ? Math.round((correct / total) * 100) : 0;
    const progress = Math.round((profile.levelProgress || 0) * 100);
    const progressDetails = profile.levelProgressDetails || {};
    const xpNeeded = progressDetails.xpNeeded || 0;

    headline.textContent = 'Level ' + (profile.level || 1) + ' | ' + ((APP_STATE.auth.user && APP_STATE.auth.user.displayName) || 'Spielstand');
    summary.textContent = '🎮 Sammle XP, halte deine Streak und knacke dein nächstes Level.';
    xp.textContent = String(profile.xp || 0);
    level.textContent = String(profile.level || 1);
    streak.textContent = String(profile.streak || 0);
    accuracy.textContent = percent + ' %';
    progressBar.style.width = progress + '%';
    progressLabel.textContent = progress + ' % bis Level ' + ((profile.level || 1) + 1) + ' · ' + xpNeeded + ' XP fehlen';
    badges.innerHTML = profile.badges && profile.badges.length
      ? profile.badges.map(function(badge) {
        const badgeLabel = (badge.emoji ? badge.emoji + ' ' : '') + (badge.title || badge.id || '');
        return '<span class="badge-pill" title="' + escapeAttribute(badge.description || '') + '">' + escapeHtml(badgeLabel) + '</span>';
      }).join('')
      : '<span class="badge-pill">Noch keine Badges</span>';
    renderProfileView();
  }

    const summary = document.getElementById('profilePageSummary');
    const xp = document.getElementById('profilePageXp');
    const level = document.getElementById('profilePageLevel');

    const accuracy = document.getElementById('profilePageAccuracy');

    const progressLabel = document.getElementById('profilePageProgressLabel');
    const badges = document.getElementById('profilePageBadges');

    const profileClassStatus = document.getElementById('profileClassStatus');
    const profileClassesPanel = document.getElementById('profileClassesPanel');

    if (!headline) {
      return;
    }

    if (!profile) {
      headline.textContent = 'Noch kein Profil geladen';
      summary.textContent = 'Sobald du angemeldet bist, siehst du hier deine Statistik.';
      xp.textContent = '0';
      level.textContent = '1';
      streak.textContent = '0';
      accuracy.textContent = '0 %';
      progressBar.style.width = '0%';
      progressLabel.textContent = '0 % bis Level 2';
      badges.innerHTML = '<span class="badge-pill">Noch keine Badges</span>';
      profileClassStatus.textContent = 'Melde dich an, um einer Klasse beizutreten.';

      statsPanel.innerHTML = '<div class="empty-state">Noch keine Statistik vorhanden.</div>';
      errorsPanel.innerHTML = '<div class="empty-state">Noch keine Fehlerdaten vorhanden.</div>';

    }

    const total = profile.stats && profile.stats.total ? profile.stats.total : 0;
    const correct = profile.stats && profile.stats.correct ? profile.stats.correct : 0;
    const wrong = profile.stats && profile.stats.wrong ? profile.stats.wrong : 0;
    const percent = total ? Math.round((correct / total) * 100) : 0;
    const progress = Math.round((profile.levelProgress || 0) * 100);
    const errorTopics = profile.errorTopics || {};
    const sortedTopics = Object.keys(errorTopics).sort(function(a, b) {
      return (errorTopics[b] || 0) - (errorTopics[a] || 0);
    });

    headline.textContent = (APP_STATE.auth.user && APP_STATE.auth.user.displayName ? APP_STATE.auth.user.displayName : 'Dein Profil') + ' | Level ' + (profile.level || 1);
    summary.textContent = 'Hier siehst du deinen gesamten Fortschritt über XP, Serien, Trefferquote und typische Fehler.';
    xp.textContent = String(profile.xp || 0);
    level.textContent = String(profile.level || 1);
    streak.textContent = String(profile.streak || 0);
    accuracy.textContent = percent + ' %';
    progressBar.style.width = progress + '%';
    progressLabel.textContent = progress + ' % bis Level ' + ((profile.level || 1) + 1);
    badges.innerHTML = profile.badges && profile.badges.length
      ? profile.badges.map(function(badge) {
        const badgeLabel = (badge.emoji ? badge.emoji + ' ' : '') + (badge.title || badge.id || '');
        return '<span class="badge-pill" title="' + escapeAttribute(badge.description || '') + '">' + escapeHtml(badgeLabel) + '</span>';
      }).join('')
      : '<span class="badge-pill">Noch keine Badges</span>';

    statsPanel.innerHTML =
      '<div class="stats-grid">' +
      '<div class="stats-tile"><span>Aufgaben gesamt</span><strong>' + escapeHtml(String(total)) + '</strong></div>' +
      '<div class="stats-tile"><span>Richtig</span><strong>' + escapeHtml(String(correct)) + '</strong></div>' +
      '<div class="stats-tile"><span>Falsch</span><strong>' + escapeHtml(String(wrong)) + '</strong></div>' +
      '<div class="stats-tile"><span>Mastery</span><strong>' + escapeHtml(String(Math.round((profile.mastery || 0) * 100))) + ' %</strong></div>' +
      '</div>';

    errorsPanel.innerHTML = sortedTopics.length
      ? '<div class="profile-list">' + sortedTopics.slice(0, 6).map(function(topicKey) {
        return '<div class="profile-list-item"><strong>' + escapeHtml(topicKey) + '</strong><br>' + escapeHtml(String(errorTopics[topicKey] || 0)) + ' Fehler</div>';
      }).join('') + '</div>'
      : '<div class="empty-state">Noch keine häufigen Fehler erfasst.</div>';

    renderProfileClassroomPanel(profileClassStatus, profileClassesPanel);
  }

  function renderProfileClassroomPanel(statusNode, panelNode) {
    if (!statusNode || !panelNode) {
      return;
    }

    const memberships = APP_STATE.auth.user && Array.isArray(APP_STATE.auth.user.classMemberships)
      ? APP_STATE.auth.user.classMemberships
      : [];
    const activeClassId = APP_STATE.auth.user && APP_STATE.auth.user.classId ? APP_STATE.auth.user.classId : '';

    if (!APP_STATE.auth.user) {
      statusNode.textContent = 'Melde dich an, um einer Klasse beizutreten.';
      statusNode.className = 'teacher-status';
      panelNode.innerHTML = '<div class="empty-state">Noch keine Klassen verknüpft.</div>';
      return;
    }

    if (!memberships.length) {
      statusNode.textContent = 'Du bist aktuell keiner Klasse beigetreten.';
      statusNode.className = 'teacher-status';
      panelNode.innerHTML = '<div class="empty-state">Gib oben einen Klassen-Code ein, um beizutreten.</div>';
      return;
    }

    const activeClass = memberships.find(function(item) {
      return item.classId === activeClassId;
    }) || memberships[0];
    const activeInfo = [activeClass.classLevel, activeClass.teacherName].filter(Boolean).join(' · ');

    statusNode.textContent = 'Aktive Klasse: ' + activeClass.className + (activeInfo ? ' · ' + activeInfo : '');
    statusNode.className = 'teacher-status success';
    panelNode.innerHTML = '<div class="teacher-list">' + memberships.map(function(item) {
      const meta = [item.classLevel, item.teacherName, item.joinedAt ? 'beigetreten ' + formatTimestamp(item.joinedAt) : ''].filter(Boolean).join(' · ');
      const isActive = item.classId === activeClassId;
      return '' +
        '<article class="teacher-class-item">' +
        '<strong>' + escapeHtml(item.className) + '</strong>' +
        '<div class="teacher-class-meta">' + escapeHtml(meta || 'Klasse ohne Zusatzangabe') + '</div>' +
        '<div class="teacher-class-actions">' +
        '<span class="teacher-code-pill">' + escapeHtml(item.classCode) + '</span>' +
        '<button type="button" class="ghost-button" ' + (isActive ? 'disabled' : 'onclick="switchClassroomFromProfile(\'' + escapeJs(item.classId) + '\')"') + '>' + (isActive ? 'Aktiv' : 'Als aktiv setzen') + '</button>' +
        '</div>' +
        '</article>';
    }).join('') + '</div>';
  }

  function renderTaskInput(task, index) {
    if (task.type === 'choice') {
      return '<div class="choice-list">' + (task.optionen || []).map(function(option, optionIndex) {
        return '' +
          '<label class="choice-item">' +
          '<input type="radio" name="choiceTask' + index + '" value="' + escapeAttribute(option) + '"' + (optionIndex === 0 ? '' : '') + '>' +
          '<span>' + escapeHtml(option) + '</span>' +
          '</label>';
      }).join('') + '</div>';
    }

    if (task.type === 'order') {
      const options = Array.isArray(task.optionen) ? task.optionen : [];
      return '' +
        '<div class="order-bank">' + options.map(function(option) {
          return '<button type="button" class="order-chip" onclick="fillDropSlot(' + index + ', \'' + escapeJs(option) + '\')">' + escapeHtml(option) + '</button>';
        }).join('') + '</div>' +
        '<div class="order-slots" id="orderSlots' + index + '">' + (task.loesung || []).map(function(_, slotIndex) {
          return '<button type="button" class="drop-slot" data-task-index="' + index + '" data-slot-index="' + slotIndex + '" onclick="clearDropSlot(' + index + ', ' + slotIndex + ')">Platz ' + (slotIndex + 1) + '</button>';
        }).join('') + '</div>';
    }

    if (APP_STATE.subject === 'deutsch' && APP_STATE.topic === 'schreiben') {
      return '<textarea class="task-textarea" id="taskInput' + index + '" placeholder="Schreibe hier deine Antwort ..." onkeydown="handleTaskInputKeydown(' + index + ', event)"></textarea>';
    }

    return '<input class="task-input" id="taskInput' + index + '" type="text" placeholder="Deine Antwort" onkeydown="handleTaskInputKeydown(' + index + ', event)">';
  }

  function renderTest() {
    const panel = document.getElementById('testPanel');
    if (APP_STATE.testLoading) {
      panel.innerHTML = '<div class="loading-state">Der Test mit 20 Aufgaben wird vorbereitet ...</div>';
      return;
    }

    if (!APP_STATE.testTasks.length) {
      panel.innerHTML = '<div class="empty-state">Noch kein Test geladen. Öffne den Test-Tab erneut, um einen neuen Test zu starten.</div>';
      return;
    }

    const result = APP_STATE.test.result;
    const summary = result
      ? '<div class="test-summary"><h3>Test ausgewertet: Note ' + escapeHtml(String(result.note)) + '</h3><p>Du hast ' + escapeHtml(String(result.correctCount)) + ' von ' + escapeHtml(String(result.totalCount)) + ' Aufgaben richtig gelöst. Das sind ' + escapeHtml(String(Math.round((result.ratio || 0) * 100))) + ' %.</p><div class="test-actions"><button class="primary-button" onclick="openTest()">Neuen Test starten</button></div></div>'
      : '<div class="test-summary"><h3>Testmodus</h3><p>Der Test umfasst 20 automatisch prüfbare Aufgaben passend zu Fach, Thema und Klassenstufe. Am Ende bekommst du sofort deine Note.</p><div class="test-actions"><button class="primary-button" onclick="submitTest()">Test abgeben</button><button class="ghost-button" onclick="openTest()">Neu laden</button></div></div>';

    panel.innerHTML = summary + '<div class="test-stack">' + APP_STATE.testTasks.map(function(task, index) {
      const taskResult = result && result.results && result.results[index]
        ? '<div class="result ' + (result.results[index].correct ? 'good' : 'bad') + '">' + escapeHtml(result.results[index].correct ? 'Richtig' : 'Nicht richtig') + (result.results[index].message ? ': ' + escapeHtml(result.results[index].message) : '') + '</div>'
        : '<div class="result" id="testResult' + index + '"></div>';
      return '' +
        '<article class="task-card" data-test-task-index="' + index + '">' +
        '<h3>Testaufgabe ' + (index + 1) + '</h3>' +
        '<p>' + escapeHtml(task.frage || '') + '</p>' +
        renderTestTaskInput(task, index) +
        taskResult +
        '</article>';
    }).join('') + '</div>';
  }

  function renderTestTaskInput(task, index) {
    if (task.type === 'choice') {
      return '<div class="choice-list">' + (task.optionen || []).map(function(option) {
        return '' +
          '<label class="choice-item">' +
          '<input type="radio" name="testChoiceTask' + index + '" value="' + escapeAttribute(option) + '"' + (APP_STATE.test.submitted ? ' disabled' : '') + '>' +
          '<span>' + escapeHtml(option) + '</span>' +
          '</label>';
      }).join('') + '</div>';
    }

    if (task.type === 'order') {
      const options = Array.isArray(task.optionen) ? task.optionen : [];
      return '' +
        '<div class="order-bank">' + options.map(function(option) {
          return '<button type="button" class="order-chip" ' + (APP_STATE.test.submitted ? 'disabled ' : '') + 'onclick="fillTestDropSlot(' + index + ', \'' + escapeJs(option) + '\')">' + escapeHtml(option) + '</button>';
        }).join('') + '</div>' +
        '<div class="order-slots" id="testOrderSlots' + index + '">' + (task.loesung || []).map(function(_, slotIndex) {
          return '<button type="button" class="drop-slot" data-test-task-index="' + index + '" data-slot-index="' + slotIndex + '" ' + (APP_STATE.test.submitted ? 'disabled ' : '') + 'onclick="clearTestDropSlot(' + index + ', ' + slotIndex + ')">Platz ' + (slotIndex + 1) + '</button>';
        }).join('') + '</div>';
    }

    return '<input class="task-input" id="testTaskInput' + index + '" type="text" placeholder="Deine Antwort"' + (APP_STATE.test.submitted ? ' disabled' : '') + '>';
  }

  function fillTestDropSlot(taskIndex, value) {
    if (APP_STATE.test.submitted) {
      return;
    }
    const slots = Array.from(document.querySelectorAll('#testOrderSlots' + taskIndex + ' .drop-slot'));
    const nextEmpty = slots.find(function(slot) {
      return !slot.dataset.value;
    });
    if (!nextEmpty) {
      return;
    }
    nextEmpty.dataset.value = value;
    nextEmpty.textContent = value;
    nextEmpty.classList.add('filled');
  }

  function clearTestDropSlot(taskIndex, slotIndex) {
    if (APP_STATE.test.submitted) {
      return;
    }
    const slot = document.querySelector('.drop-slot[data-test-task-index="' + taskIndex + '"][data-slot-index="' + slotIndex + '"]');
    if (!slot) {
      return;
    }
    slot.dataset.value = '';
    slot.textContent = 'Platz ' + (slotIndex + 1);
    slot.classList.remove('filled');
  }

  function getTestAnswer(index) {
    const task = APP_STATE.testTasks[index];
    if (!task) {
      return '';
    }

    if (task.type === 'choice') {
      const checked = document.querySelector('input[name="testChoiceTask' + index + '"]:checked');
      return checked ? checked.value : '';
    }

    if (task.type === 'order') {
      const values = Array.from(document.querySelectorAll('#testOrderSlots' + index + ' .drop-slot')).map(function(slot) {
        return slot.dataset.value || '';
      });
      return JSON.stringify(values);
    }

    const input = document.getElementById('testTaskInput' + index);
    return input ? input.value : '';
  }

  function submitTest() {
    if (!ensureAuthenticated()) {
      return;
    }
    if (!APP_STATE.testTasks.length || APP_STATE.test.submitted) {
      return;
    }

    const answers = APP_STATE.testTasks.map(function(_, index) {
      return getTestAnswer(index);
    });

    google.script.run
      .withSuccessHandler(function(result) {
        APP_STATE.test.submitted = true;
        APP_STATE.test.result = result;
        renderTest();
      })
      .withFailureHandler(function(error) {
        if (error && /anmeldung|erneut anmelden|abgelaufen/i.test(error.message || '')) {
          handleAuthFailure(error, 'Die Anmeldung ist abgelaufen.');
          return;
        }
        document.getElementById('testPanel').insertAdjacentHTML(
          'afterbegin',
          '<div class="empty-state">Der Test konnte nicht ausgewertet werden. ' + escapeHtml(error && error.message ? error.message : 'Bitte versuche es erneut.') + '</div>'
        );
      })
      .evaluateTest(APP_STATE.auth.token, APP_STATE.subject, APP_STATE.topic, APP_STATE.subtopic || '', APP_STATE.testTasks, answers);
  }

  function handleTaskInputKeydown(index, event) {
    if (!APP_STATE.settings.enterChecksTask) {
      return;
    }

    if (event.key !== 'Enter' || event.isComposing) {
      return;
    }

    if (event.shiftKey) {
      return;
    }

    event.preventDefault();
    checkTask(index);
  }

  function renderSettings() {
    const taskCountRoot = document.getElementById('taskCountSettings');
    const themeModeRoot = document.getElementById('themeModeSettings');
    const teacherModeButton = document.getElementById('teacherModeButton');
    const teacherModeStatus = document.getElementById('teacherModeStatus');
    const themeModes = [
      { value: 'system', label: 'System' },
      { value: 'light', label: 'Hell' },
      { value: 'dark', label: 'Dunkel' }
    ];

    taskCountRoot.innerHTML =
      '<div class="task-count-header">' +
        '<strong id="taskCountValue">' + APP_STATE.settings.taskCount + '</strong>' +
        '<span>Aufgaben pro Runde</span>' +
      '</div>' +
      '<input type="range" min="1" max="20" step="1" value="' + APP_STATE.settings.taskCount + '" class="task-count-slider" id="taskCountSlider" oninput="updateTaskCountSetting(this.value, true)" onchange="updateTaskCountSetting(this.value)">' +
      '<div class="task-count-scale"><span>1</span><span>10</span><span>20</span></div>';

    themeModeRoot.innerHTML = themeModes.map(function(mode) {
      const active = APP_STATE.settings.themeMode === mode.value ? ' active' : '';
      return '<button type="button" class="settings-choice' + active + '" onclick="updateThemeModeSetting(\'' + mode.value + '\')">' + mode.label + '</button>';
    }).join('');

    document.getElementById('settingEnterChecksTask').checked = !!APP_STATE.settings.enterChecksTask;
    document.getElementById('settingEnterSendsChat').checked = !!APP_STATE.settings.enterSendsChat;

    if (!APP_STATE.auth.user) {
      teacherModeButton.disabled = true;
      teacherModeStatus.textContent = 'Bitte melde dich zuerst an.';
      teacherModeStatus.className = 'teacher-status';
      return;
    }

    teacherModeButton.disabled = APP_STATE.auth.user.role === 'teacher';
    teacherModeStatus.textContent = APP_STATE.auth.user.role === 'teacher'
      ? 'Lehrermodus aktiv. Der Bereich „Klassen“ ist freigeschaltet.'
      : 'Du kannst dieses Konto jetzt als Lehrerkonto freischalten.';
    teacherModeStatus.className = 'teacher-status' + (APP_STATE.auth.user.role === 'teacher' ? ' success' : '');
  }

  function updateTaskCountSetting(count, skipRerender) {
    APP_STATE.settings.taskCount = Math.min(Math.max(parseInt(count, 10) || 5, 1), 20);
    persistSettings();
    updateLabels();
    const valueNode = document.getElementById('taskCountValue');
    const sliderNode = document.getElementById('taskCountSlider');
    if (valueNode) {
      valueNode.textContent = APP_STATE.settings.taskCount;
    }
    if (sliderNode) {
      sliderNode.value = String(APP_STATE.settings.taskCount);
    }
    if (!skipRerender) {
      renderSettings();
    }
  }

  function updateBooleanSetting(key, value) {
    APP_STATE.settings[key] = !!value;
    persistSettings();
  }

  function updateThemeModeSetting(mode) {
    APP_STATE.settings.themeMode = mode;
    persistSettings();
    applyTheme();
    renderSettings();
  }

  function resetSettings() {
    APP_STATE.settings = {
      taskCount: 5,
      enterChecksTask: true,
      enterSendsChat: true,
      themeMode: 'system'
    };
    persistSettings();
    applyTheme();
    renderSettings();
  }

  function persistSettings() {
    try {
      localStorage.setItem('lernova-settings', JSON.stringify(APP_STATE.settings));
    } catch (error) {
      // Ignore storage errors.
    }
  }

  function hydrateSettings() {
    try {
      const raw = localStorage.getItem('lernova-settings');
      if (!raw) {
        return;
      }
      const parsed = JSON.parse(raw);
      if (!parsed || typeof parsed !== 'object') {
        return;
      }
      APP_STATE.settings.taskCount = Math.min(Math.max(parseInt(parsed.taskCount, 10) || 5, 1), 20);
      APP_STATE.settings.enterChecksTask = parsed.enterChecksTask !== false;
      APP_STATE.settings.enterSendsChat = parsed.enterSendsChat !== false;
      APP_STATE.settings.themeMode = ['system', 'light', 'dark'].indexOf(parsed.themeMode) !== -1 ? parsed.themeMode : 'system';
    } catch (error) {
      // Ignore malformed stored settings.
    }
  }

  function persistAuthToken() {
    try {
      if (APP_STATE.auth.token) {
        localStorage.setItem('lernova-auth-token', APP_STATE.auth.token);
      } else {
        localStorage.removeItem('lernova-auth-token');
      }
    } catch (error) {
      // Ignore storage errors.
    }
  }

  function hydrateAuthToken() {
    try {
      APP_STATE.auth.token = localStorage.getItem('lernova-auth-token') || '';
    } catch (error) {
      APP_STATE.auth.token = '';
    }
  }

  function ensureAuthenticated(message) {
    if (APP_STATE.auth.user) {
      return true;
    }

    syncAuthUi();
    showAuthStatus(message || 'Bitte melde dich zuerst an.', 'error');
    return false;
  }

  function ensureTeacher(message) {
    if (!ensureAuthenticated(message)) {
      return false;
    }
    if (APP_STATE.auth.user && APP_STATE.auth.user.role === 'teacher') {
      return true;
    }
    showTeacherStatus(message || 'Aktiviere zuerst den Lehrermodus in den Einstellungen.', 'error');
    return false;
  }

  function showAuthStatus(message, type) {
    const status = document.getElementById('authStatus');
    status.textContent = message;
    status.className = 'auth-status' + (type ? ' ' + type : '');
  }

  function showTeacherStatus(message, type) {
    const status = document.getElementById('teacherStatus');
    const modeStatus = document.getElementById('teacherModeStatus');
    status.textContent = message;
    status.className = 'teacher-status' + (type ? ' ' + type : '');
    modeStatus.textContent = message;
    modeStatus.className = 'teacher-status' + (type ? ' ' + type : '');
  }

  function setAuthPending(isPending) {
    document.getElementById('accountLoginButton').disabled = isPending;
    document.getElementById('accountCreateButton').disabled = isPending;
    document.getElementById('loginHandleInput').disabled = isPending;
    document.getElementById('loginPasswordInput').disabled = isPending;
    document.getElementById('createNameInput').disabled = isPending;
    document.getElementById('createPasswordInput').disabled = isPending;
  }

  function syncAuthUi() {
    const isAuthenticated = !!APP_STATE.auth.user;
    document.getElementById('authOverlay').classList.toggle('hidden', isAuthenticated);
    document.getElementById('appShell').classList.toggle('hidden', !isAuthenticated);

    const sessionBadge = document.getElementById('sessionBadge');
    const logoutButton = document.getElementById('logoutButton');
    const classesTrigger = document.getElementById('classesTrigger');
    const profileTrigger = document.getElementById('profileTrigger');
    const teacherModeButton = document.getElementById('teacherModeButton');

    if (isAuthenticated) {
      const methodLabel = 'Konto';
      sessionBadge.textContent = methodLabel + ': ' + (APP_STATE.auth.user.loginLabel || APP_STATE.auth.user.displayName);
      sessionBadge.classList.remove('hidden');
      logoutButton.classList.remove('hidden');
      profileTrigger.classList.remove('hidden');
      classesTrigger.classList.toggle('hidden', APP_STATE.auth.user.role !== 'teacher');
      teacherModeButton.disabled = APP_STATE.auth.user.role === 'teacher';
      document.getElementById('loginHandleInput').value = '';
      document.getElementById('loginPasswordInput').value = '';
      document.getElementById('createNameInput').value = '';
      document.getElementById('createPasswordInput').value = '';
      document.getElementById('createSuffixInput').value = '#0001';
      showAuthStatus('Angemeldet als ' + APP_STATE.auth.user.displayName + '.', 'success');
      if (APP_STATE.auth.user.role === 'teacher') {
        showTeacherStatus('Lehrermodus aktiv. Du kannst jetzt Klassen anlegen und Lernaktivitäten einsehen.', 'success');
      } else {
        showTeacherStatus('Du kannst dein Konto in den Einstellungen als Lehrerkonto freischalten.', '');
      }
    } else {
      setAuthPending(false);
      sessionBadge.textContent = '';
      sessionBadge.classList.add('hidden');
      logoutButton.classList.add('hidden');
      profileTrigger.classList.add('hidden');
      classesTrigger.classList.add('hidden');
      teacherModeButton.disabled = false;
      closeHelpChat();
      closeSettings();
      showAuthStatus('Bitte melde dich an, bevor du Aufgaben, Tipps oder den Hilfe-Chat nutzt.', '');
      showTeacherStatus('Aktuell ist kein Lehrermodus aktiv.', '');
      setActiveView('homeView');
    }

    updateLabels();
  }

  function applyAuthenticatedSession(token, session) {
    APP_STATE.auth.token = token;
    APP_STATE.auth.user = session || null;
    APP_STATE.progress.profile = session && session.profile ? session.profile : null;
    APP_STATE.auth.ready = true;
    persistAuthToken();
    syncAuthUi();
    if (APP_STATE.auth.user && APP_STATE.auth.user.role === 'teacher') {
      loadTeacherDashboard();
    }
  }

  function clearAuthState() {
    APP_STATE.auth.token = '';
    APP_STATE.auth.user = null;
    APP_STATE.progress.profile = null;
    APP_STATE.auth.ready = true;
    APP_STATE.teacher.classes = [];
    APP_STATE.teacher.activities = [];
    APP_STATE.teacher.loading = false;
    APP_STATE.teacher.selectedClassId = '';
    APP_STATE.teacher.selectedStudentKey = '';
    persistAuthToken();
    syncAuthUi();
  }

  function handleAuthFailure(error, fallbackMessage) {
    const message = error && error.message ? error.message : fallbackMessage;
    clearAuthState();
    showAuthStatus(message || 'Die Anmeldung ist fehlgeschlagen.', 'error');
  }

  function restoreAuthSession() {
    hydrateAuthToken();
    if (!APP_STATE.auth.token) {
      APP_STATE.auth.ready = true;
      syncAuthUi();
      return;
    }

    google.script.run
      .withSuccessHandler(function(response) {
        if (response && response.authenticated && response.session) {
          applyAuthenticatedSession(APP_STATE.auth.token, response.session);
          return;
        }
        clearAuthState();
      })
      .withFailureHandler(function(error) {
        handleAuthFailure(error, 'Die gespeicherte Anmeldung konnte nicht wiederhergestellt werden.');
      })
      .getAuthStatus(APP_STATE.auth.token);
  }

  function updateAccountPreview() {
    const name = document.getElementById('createNameInput').value.trim();
    if (!name) {
      document.getElementById('createSuffixInput').value = '#0001';
      return;
    }

    google.script.run
      .withSuccessHandler(function(response) {
        document.getElementById('createSuffixInput').value = response && response.suffix ? response.suffix : '#0001';
      })
      .withFailureHandler(function() {
        document.getElementById('createSuffixInput').value = '#0001';
      })
      .getAccountSuffixPreview(name);
  }

  function submitAccountLogin() {
    const handle = document.getElementById('loginHandleInput').value.trim();
    const password = document.getElementById('loginPasswordInput').value;

    if (!handle) {
      showAuthStatus('Bitte gib deinen Namen mit #0001 ein.', 'error');
      return;
    }
    if (!password) {
      showAuthStatus('Bitte gib dein Passwort ein.', 'error');
      return;
    }

    setAuthPending(true);
    showAuthStatus('Account wird angemeldet ...', '');

    google.script.run
      .withSuccessHandler(function(response) {
        setAuthPending(false);
        applyAuthenticatedSession(response.token, response.session);
        showAuthStatus('Anmeldung erfolgreich.', 'success');
      })
      .withFailureHandler(function(error) {
        setAuthPending(false);
        showAuthStatus(error && error.message ? error.message : 'Die Anmeldung ist fehlgeschlagen.', 'error');
      })
      .loginWithLocalAccount(handle, password);
  }

  function submitAccountCreate() {
    const name = document.getElementById('createNameInput').value.trim();
    const password = document.getElementById('createPasswordInput').value;

    if (!name) {
      showAuthStatus('Bitte gib zuerst deinen Namen ein.', 'error');
      return;
    }
    if (!password) {
      showAuthStatus('Bitte gib ein Passwort ein.', 'error');
      return;
    }

    setAuthPending(true);
    showAuthStatus('Account wird erstellt ...', '');

    google.script.run
      .withSuccessHandler(function(response) {
        setAuthPending(false);
        applyAuthenticatedSession(response.token, response.session);
        showAuthStatus('Account erstellt und angemeldet.', 'success');
      })
      .withFailureHandler(function(error) {
        setAuthPending(false);
        showAuthStatus(error && error.message ? error.message : 'Der Account konnte nicht erstellt werden.', 'error');
      })
      .createLocalAccount(name, password);
  }

  function handleAccountAuthKeydown(event, mode) {
    if (event.key !== 'Enter') {
      return;
    }

    event.preventDefault();
    if (mode === 'create') {
      submitAccountCreate();
      return;
    }
    submitAccountLogin();
  }

  function logoutUser() {
    const token = APP_STATE.auth.token;
    clearAuthState();

    if (!token) {
      return;
    }

    google.script.run
      .withFailureHandler(function() {
        showAuthStatus('Die lokale Anmeldung wurde beendet, aber das Server-Logout konnte nicht bestätigt werden.', 'error');
      })
      .logout(token);
  }

  function enableTeacherMode() {
    if (!ensureAuthenticated()) {
      return;
    }
    if (APP_STATE.auth.user.role === 'teacher') {
      showTeacherStatus('Der Lehrermodus ist bereits aktiv.', 'success');
      return;
    }

    google.script.run
      .withSuccessHandler(function(response) {
        APP_STATE.auth.user = response;
        APP_STATE.progress.profile = response && response.profile ? response.profile : APP_STATE.progress.profile;
        syncAuthUi();
        showTeacherStatus('Lehrermodus aktiviert. Der Bereich „Klassen“ ist jetzt freigeschaltet.', 'success');
      })
      .withFailureHandler(function(error) {
        showTeacherStatus(error && error.message ? error.message : 'Der Lehrermodus konnte nicht aktiviert werden.', 'error');
      })
      .activateTeacherMode(APP_STATE.auth.token);
  }

  function loadTeacherDashboard() {
    if (!ensureTeacher()) {
      return;
    }

    APP_STATE.teacher.loading = true;
    renderTeacherDashboard();

    google.script.run
      .withSuccessHandler(function(response) {
        APP_STATE.teacher.loading = false;
        APP_STATE.teacher.classes = response && Array.isArray(response.classes) ? response.classes : [];
        APP_STATE.teacher.activities = response && Array.isArray(response.activities) ? response.activities : [];
        syncTeacherSelectionState();
        renderTeacherDashboard();
      })
      .withFailureHandler(function(error) {
        APP_STATE.teacher.loading = false;
        showTeacherStatus(error && error.message ? error.message : 'Der Lehrerbereich konnte nicht geladen werden.', 'error');
        renderTeacherDashboard();
      })
      .getTeacherDashboard(APP_STATE.auth.token);
  }

  function renderTeacherDashboard() {
    const classesPanel = document.getElementById('teacherClassesPanel');
    const studentsPanel = document.getElementById('teacherStudentsPanel');
    const activityPanel = document.getElementById('teacherActivityPanel');
    const studentsMeta = document.getElementById('teacherStudentsMeta');
    const activityHeadline = document.getElementById('teacherActivityHeadline');
    const activityMeta = document.getElementById('teacherActivityMeta');

    if (!APP_STATE.auth.user || APP_STATE.auth.user.role !== 'teacher') {
      classesPanel.innerHTML = '<div class="empty-state">Der Bereich „Klassen“ steht erst nach Aktivierung des Lehrermodus zur Verfügung.</div>';
      studentsPanel.innerHTML = '<div class="empty-state">Noch keine Schülerdaten verfügbar.</div>';
      activityPanel.innerHTML = '<div class="empty-state">Noch keine Lehrerdaten verfügbar.</div>';
      return;
    }

    if (APP_STATE.teacher.loading) {
      classesPanel.innerHTML = '<div class="loading-state">Klassen werden geladen ...</div>';
      studentsPanel.innerHTML = '<div class="loading-state">Schüler werden geladen ...</div>';
      activityPanel.innerHTML = '<div class="loading-state">Aktivitäten werden geladen ...</div>';
      return;
    }

    syncTeacherSelectionState();

    if (!APP_STATE.teacher.classes.length) {
      classesPanel.innerHTML = '<div class="empty-state">Noch keine Klassen angelegt. Erstelle oben deine erste Klasse.</div>';
      studentsPanel.innerHTML = '<div class="empty-state">Lege zuerst eine Klasse an, damit hier deine Schülerliste erscheint.</div>';
      activityPanel.innerHTML = '<div class="empty-state">Sobald Schüler einer Klasse beitreten, siehst du hier ihre Aktivitäten.</div>';
      studentsMeta.textContent = 'Wähle zuerst eine Klasse aus.';
      activityHeadline.textContent = 'Schüleraktivitäten';
      activityMeta.textContent = 'Klicke auf einen Schüler, um die letzten Aktivitäten zu sehen.';
    } else {
      classesPanel.innerHTML = '<div class="teacher-list">' + APP_STATE.teacher.classes.map(function(item) {
        const subtitle = [
          item.classLevel,
          String(item.studentCount || 0) + ' Schüler',
          item.lastActivityAt ? 'letzte Aktivität ' + formatTimestamp(item.lastActivityAt) : ''
        ].filter(Boolean).join(' · ');
        const activeClass = APP_STATE.teacher.selectedClassId === item.classId ? ' active' : '';
        return '' +
          '<article class="teacher-class-item teacher-select-card' + activeClass + '" onclick="selectTeacherClass(\'' + escapeJs(item.classId) + '\')">' +
          '<strong>' + escapeHtml(item.className) + '</strong>' +
          '<div class="teacher-class-meta">' + escapeHtml(subtitle || 'Klasse ohne Zusatzangabe') + '</div>' +
          '<div class="teacher-class-actions">' +
          '<span class="teacher-code-pill">' + escapeHtml(item.classCode) + '</span>' +
          '<button type="button" class="ghost-button" onclick="handleTeacherClassCodeRegenerate(event, \'' + escapeJs(item.classId) + '\')">Neuen Code erzeugen</button>' +
          '</div>' +
          '</article>';
      }).join('') + '</div>';
    }

    const selectedClass = getSelectedTeacherClass_();
    if (!selectedClass) {
      studentsPanel.innerHTML = '<div class="empty-state">Wähle eine Klasse aus, um die Schülerliste zu öffnen.</div>';
      activityPanel.innerHTML = '<div class="empty-state">Wähle erst eine Klasse und dann einen Schüler aus.</div>';
      studentsMeta.textContent = 'Wähle zuerst eine Klasse aus.';
      activityHeadline.textContent = 'Schüleraktivitäten';
      activityMeta.textContent = 'Klicke auf einen Schüler, um die letzten Aktivitäten zu sehen.';
      return;
    }

    studentsMeta.textContent = selectedClass.className + (selectedClass.classLevel ? ' · ' + selectedClass.classLevel : '') + ' · ' + String((selectedClass.students || []).length) + ' Schüler';

    if (!selectedClass.students || !selectedClass.students.length) {
      studentsPanel.innerHTML = '<div class="empty-state">In dieser Klasse sind noch keine Schüler verknüpft.</div>';
      activityPanel.innerHTML = '<div class="empty-state">Sobald Schüler beitreten und arbeiten, erscheinen hier ihre Aktivitäten.</div>';
      activityHeadline.textContent = 'Schüleraktivitäten';
      activityMeta.textContent = 'Noch kein Schüler ausgewählt.';
      return;
    }

    studentsPanel.innerHTML = '<div class="teacher-list">' + selectedClass.students.map(function(student) {
      const activeStudent = APP_STATE.teacher.selectedStudentKey === student.selectionKey ? ' active' : '';
      const studentMeta = [
        student.activityCount ? String(student.activityCount) + ' Einträge' : 'Noch keine Einträge',
        student.lastActivityAt ? 'zuletzt ' + formatTimestamp(student.lastActivityAt) : '',
        student.lastActionType ? formatActionType(student.lastActionType) : ''
      ].filter(Boolean).join(' · ');

      return '' +
        '<article class="teacher-class-item teacher-select-card' + activeStudent + '" onclick="selectTeacherStudent(\'' + escapeJs(selectedClass.classId) + '\', \'' + escapeJs(student.selectionKey) + '\')">' +
        '<strong>' + escapeHtml(student.studentName || 'Unbekannt') + '</strong>' +
        '<div class="teacher-class-meta">' + escapeHtml(studentMeta) + '</div>' +
        '</article>';
    }).join('') + '</div>';

    const selectedStudent = getSelectedTeacherStudent_(selectedClass);
    if (!selectedStudent) {
      activityPanel.innerHTML = '<div class="empty-state">Wähle einen Schüler aus der Liste, um seine Aktivitäten zu prüfen.</div>';
      activityHeadline.textContent = 'Schüleraktivitäten';
      activityMeta.textContent = 'Klasse: ' + selectedClass.className;
      return;
    }

    const filteredActivities = APP_STATE.teacher.activities.filter(function(item) {
      return item.classId === selectedClass.classId && item.selectionKey === selectedStudent.selectionKey;
    });

    activityHeadline.textContent = selectedStudent.studentName || 'Schüleraktivitäten';
    activityMeta.textContent = selectedClass.className + ' · ' + (filteredActivities.length ? String(filteredActivities.length) + ' letzte Einträge' : 'Noch keine protokollierten Einträge');

    if (!filteredActivities.length) {
      activityPanel.innerHTML = '<div class="empty-state">Für diesen Schüler wurden noch keine Aktivitäten protokolliert.</div>';
      return;
    }

    activityPanel.innerHTML = '<div class="activity-list">' + filteredActivities.map(function(item) {
      const meta = [
        item.subject || '',
        item.topic || '',
        item.subtopic || '',
        formatTimestamp(item.timestamp)
      ].filter(Boolean).join(' · ');

      return '' +
        '<article class="activity-item">' +
        '<strong>' + escapeHtml(formatActionType(item.actionType)) + '</strong>' +
        '<div class="activity-meta">' + escapeHtml(meta || 'Allgemeine Aktivität') + '</div>' +
        '<div class="activity-meta">' + escapeHtml((item.detail || '') + (item.status ? ' (' + item.status + ')' : '')) + '</div>' +
        '</article>';
    }).join('') + '</div>';
  }

  function syncTeacherSelectionState() {
    const classes = Array.isArray(APP_STATE.teacher.classes) ? APP_STATE.teacher.classes : [];
    const selectedClass = classes.find(function(item) {
      return item.classId === APP_STATE.teacher.selectedClassId;
    }) || classes[0] || null;

    APP_STATE.teacher.selectedClassId = selectedClass ? selectedClass.classId : '';

    if (!selectedClass || !Array.isArray(selectedClass.students) || !selectedClass.students.length) {
      APP_STATE.teacher.selectedStudentKey = '';
      return;
    }

    const selectedStudent = selectedClass.students.find(function(item) {
      return item.selectionKey === APP_STATE.teacher.selectedStudentKey;
    }) || selectedClass.students[0];

    APP_STATE.teacher.selectedStudentKey = selectedStudent ? selectedStudent.selectionKey : '';
  }

  function getSelectedTeacherClass_() {
    return (APP_STATE.teacher.classes || []).find(function(item) {
      return item.classId === APP_STATE.teacher.selectedClassId;
    }) || null;
  }

  function getSelectedTeacherStudent_(selectedClass) {
    const safeClass = selectedClass || getSelectedTeacherClass_();
    if (!safeClass || !Array.isArray(safeClass.students)) {
      return null;
    }

    return safeClass.students.find(function(item) {
      return item.selectionKey === APP_STATE.teacher.selectedStudentKey;
    }) || null;
  }

  function selectTeacherClass(classId) {
    APP_STATE.teacher.selectedClassId = String(classId || '');
    APP_STATE.teacher.selectedStudentKey = '';
    syncTeacherSelectionState();
    renderTeacherDashboard();
  }

  function selectTeacherStudent(classId, selectionKey) {
    APP_STATE.teacher.selectedClassId = String(classId || '');
    APP_STATE.teacher.selectedStudentKey = String(selectionKey || '');
    syncTeacherSelectionState();
    renderTeacherDashboard();
  }

  function handleTeacherClassCodeRegenerate(event, classId) {
    if (event && typeof event.stopPropagation === 'function') {
      event.stopPropagation();
    }
    regenerateClassCode(classId);
  }

  function createTeacherClassroom() {
    if (!ensureTeacher()) {
      return;
    }

    const className = document.getElementById('teacherClassNameInput').value.trim();
    const classLevel = document.getElementById('teacherClassLevelInput').value.trim();
    if (!className) {
      showTeacherStatus('Bitte gib zuerst einen Klassennamen ein.', 'error');
      return;
    }

    document.getElementById('createClassButton').disabled = true;
    showTeacherStatus('Klasse wird erstellt ...', '');

    google.script.run
      .withSuccessHandler(function() {
        document.getElementById('createClassButton').disabled = false;
        document.getElementById('teacherClassNameInput').value = '';
        document.getElementById('teacherClassLevelInput').value = '';
        showTeacherStatus('Klasse erstellt. Der neue Code ist jetzt im Bereich „Deine Klassen“ sichtbar.', 'success');
        loadTeacherDashboard();
      })
      .withFailureHandler(function(error) {
        document.getElementById('createClassButton').disabled = false;
        showTeacherStatus(error && error.message ? error.message : 'Die Klasse konnte nicht erstellt werden.', 'error');
      })
      .createTeacherClassroom(APP_STATE.auth.token, {
        className: className,
        classLevel: classLevel
      });
  }

  function regenerateClassCode(classId) {
    if (!ensureTeacher()) {
      return;
    }

    showTeacherStatus('Klassen-Code wird erneuert ...', '');

    google.script.run
      .withSuccessHandler(function() {
        showTeacherStatus('Der Klassen-Code wurde erneuert.', 'success');
        loadTeacherDashboard();
      })
      .withFailureHandler(function(error) {
        showTeacherStatus(error && error.message ? error.message : 'Der Klassen-Code konnte nicht erneuert werden.', 'error');
      })
      .regenerateTeacherClassCode(APP_STATE.auth.token, classId);
  }

  function handleProfileClassKeydown(event) {
    if (event.key !== 'Enter') {
      return;
    }
    event.preventDefault();
    joinClassroomFromProfile();
  }

  function joinClassroomFromProfile() {
    if (!ensureAuthenticated()) {
      return;
    }

    const input = document.getElementById('profileClassCodeInput');
    const button = document.getElementById('joinProfileClassButton');
    const classCode = input.value.trim();
    if (!classCode) {
      const status = document.getElementById('profileClassStatus');
      status.textContent = 'Bitte gib zuerst einen Klassen-Code ein.';
      status.className = 'teacher-status error';
      return;
    }

    button.disabled = true;
    const status = document.getElementById('profileClassStatus');
    status.textContent = 'Klasse wird verknüpft ...';
    status.className = 'teacher-status';

    google.script.run
      .withSuccessHandler(function(session) {
        button.disabled = false;
        input.value = '';
        APP_STATE.auth.user = session;
        APP_STATE.progress.profile = session && session.profile ? session.profile : APP_STATE.progress.profile;
        syncAuthUi();
        renderProfileView();
        status.textContent = 'Klasse erfolgreich beigetreten.';
        status.className = 'teacher-status success';
      })
      .withFailureHandler(function(error) {
        button.disabled = false;
        status.textContent = error && error.message ? error.message : 'Der Klassenbeitritt ist fehlgeschlagen.';
        status.className = 'teacher-status error';
      })
      .joinStudentClassroom(APP_STATE.auth.token, classCode);
  }

  function switchClassroomFromProfile(classId) {
    if (!ensureAuthenticated()) {
      return;
    }

    const status = document.getElementById('profileClassStatus');
    status.textContent = 'Aktive Klasse wird gewechselt ...';
    status.className = 'teacher-status';

    google.script.run
      .withSuccessHandler(function(session) {
        APP_STATE.auth.user = session;
        APP_STATE.progress.profile = session && session.profile ? session.profile : APP_STATE.progress.profile;
        syncAuthUi();
        renderProfileView();
      })
      .withFailureHandler(function(error) {
        status.textContent = error && error.message ? error.message : 'Die Klasse konnte nicht gewechselt werden.';
        status.className = 'teacher-status error';
      })
      .switchStudentClassroom(APP_STATE.auth.token, classId);
  }

  function formatTimestamp(timestamp) {
    if (!timestamp) {
      return '';
    }
    const date = new Date(timestamp);
    if (isNaN(date.getTime())) {
      return String(timestamp);
    }
    return date.toLocaleString('de-DE');
  }

  function formatActionType(actionType) {
    if (actionType === 'load_tasks') {
      return 'Aufgaben geladen';
    }
    if (actionType === 'start_test') {
      return 'Test gestartet';
    }
    if (actionType === 'finish_test') {
      return 'Test beendet';
    }
    if (actionType === 'check_answer') {
      return 'Antwort geprüft';
    }
    if (actionType === 'help_chat') {
      return 'Hilfe-Chat genutzt';
    }
    return 'Aktivität';
  }

  function getResolvedThemeMode() {
    if (APP_STATE.settings.themeMode === 'light' || APP_STATE.settings.themeMode === 'dark') {
      return APP_STATE.settings.themeMode;
    }
    if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
      return 'dark';
    }
    return 'light';
  }

  function applyTheme() {
    document.body.setAttribute('data-theme', getResolvedThemeMode());
  }

  function fillDropSlot(taskIndex, value) {
    const slots = Array.from(document.querySelectorAll('#orderSlots' + taskIndex + ' .drop-slot'));
    const nextEmpty = slots.find(function(slot) {
      return !slot.dataset.value;
    });
    if (!nextEmpty) {
      return;
    }
    nextEmpty.dataset.value = value;
    nextEmpty.textContent = value;
    nextEmpty.classList.add('filled');
  }

  function clearDropSlot(taskIndex, slotIndex) {
    const slot = document.querySelector('.drop-slot[data-task-index="' + taskIndex + '"][data-slot-index="' + slotIndex + '"]');
    if (!slot) {
      return;
    }
    slot.dataset.value = '';
    slot.textContent = 'Platz ' + (slotIndex + 1);
    slot.classList.remove('filled');
  }

  function getTaskAnswer(index) {
    const task = APP_STATE.tasks[index];
    if (!task) {
      return '';
    }

    if (task.type === 'choice') {
      const checked = document.querySelector('input[name="choiceTask' + index + '"]:checked');
      return checked ? checked.value : '';
    }

    if (task.type === 'order') {
      const values = Array.from(document.querySelectorAll('#orderSlots' + index + ' .drop-slot')).map(function(slot) {
        return slot.dataset.value || '';
      });
      return JSON.stringify(values);
    }

    const input = document.getElementById('taskInput' + index);
    return input ? input.value : '';
  }

  function checkTask(index) {
    if (!ensureAuthenticated()) {
      return;
    }

    const task = APP_STATE.tasks[index];
    if (!task) {
      return;
    }
    const userInput = getTaskAnswer(index);
    google.script.run
      .withSuccessHandler(function(response) {
        const result = document.getElementById('taskResult' + index);
        const taskCard = document.querySelector('[data-task-index="' + index + '"]');
        const checkButton = taskCard ? taskCard.querySelector('.primary-button') : null;
        const normalizedResult = normalizeCheckResult(response && response.result ? response.result : response);
        APP_STATE.progress.profile = response && response.profile ? response.profile : APP_STATE.progress.profile;

        if (normalizedResult.status === 'correct') {
          result.textContent = normalizedResult.message;
          result.className = 'result good';
          APP_STATE.taskResults[index] = {
            message: normalizedResult.message,
            className: 'good',
            locked: !response || !response.nextTask
          };
        } else if (normalizedResult.status === 'review') {
          result.textContent = normalizedResult.message;
          result.className = 'result review';
          APP_STATE.taskResults[index] = { message: normalizedResult.message, className: 'review' };
        } else {
          result.textContent = normalizedResult.message;
          result.className = 'result bad';
          APP_STATE.taskResults[index] = { message: normalizedResult.message, className: 'bad' };
        }

        renderPlayerProfile();

        if (checkButton && APP_STATE.taskResults[index] && APP_STATE.taskResults[index].locked) {
          checkButton.disabled = true;
        }

        if (response && response.nextTask && normalizedResult.status !== 'review') {
          APP_STATE.tasks[index] = response.nextTask;
          setTimeout(function() {
            APP_STATE.taskResults[index] = {
              message: normalizedResult.correct ? 'Neue Aufgabe geladen.' : 'Aehnliche Wiederholungsaufgabe geladen.',
              className: normalizedResult.correct ? 'good' : 'review'
            };
            renderTasks();
          }, 700);
        }
      })
      .withFailureHandler(function(error) {
        if (error && /anmeldung|erneut anmelden|abgelaufen/i.test(error.message || '')) {
          handleAuthFailure(error, 'Die Anmeldung ist abgelaufen.');
          return;
        }
        const result = document.getElementById('taskResult' + index);
        result.textContent = 'Prüfung fehlgeschlagen: ' + (error && error.message ? error.message : 'Unbekannter Fehler');
        result.className = 'result bad';
      })
      .submitTaskAnswer(APP_STATE.auth.token, APP_STATE.subject, APP_STATE.topic, APP_STATE.classLevel, APP_STATE.subtopic || '', task, userInput);
  }

  function normalizeCheckResult(checkResult) {
    if (checkResult && typeof checkResult === 'object') {
      return {
        status: checkResult.status || (checkResult.correct ? 'correct' : 'incorrect'),
        message: checkResult.message || (checkResult.correct ? 'Richtig gelöst.' : 'Noch nicht richtig. Schau dir die Aufgabe oder den Tipp noch einmal an.'),
        correct: !!checkResult.correct
      };
    }

    return {
      status: checkResult ? 'correct' : 'incorrect',
      message: checkResult ? 'Richtig gelöst.' : 'Noch nicht richtig. Schau dir die Aufgabe oder den Tipp noch einmal an.',
      correct: !!checkResult
    };
  }

  function showSolution(index) {
    const task = APP_STATE.tasks[index];
    const result = document.getElementById('taskResult' + index);
    const taskCard = document.querySelector('[data-task-index="' + index + '"]');
    const checkButton = taskCard ? taskCard.querySelector('.primary-button') : null;
    if (!task || !result) {
      return;
    }

    APP_STATE.taskResults[index] = {
      message: 'Lösung wurde angezeigt. Für diese Aufgabe gibt es keine XP mehr.',
      className: '',
      solutionRevealed: true
    };

    if (checkButton) {
      checkButton.disabled = false;
    }

    if (APP_STATE.subject === 'deutsch' && APP_STATE.topic === 'schreiben') {
      result.textContent = 'Musterlösung: individuelle Lösung möglich. Achte auf Aufbau, Verständlichkeit und passende Sprache. Für diese Aufgabe gibt es keine XP mehr.';
    } else {
      result.textContent = 'Lösung: ' + (Array.isArray(task.loesung) ? task.loesung.join(' → ') : task.loesung) + ' | Für diese Aufgabe gibt es keine XP mehr.';
    }
    result.className = 'result';

    if (ensureAuthenticated() && task.id) {
      google.script.run
        .withFailureHandler(function() {
          // Die UI bleibt trotzdem gesperrt; die serverseitige Markierung wird beim nächsten Versuch erneut gesetzt.
        })
        .markTaskSolutionViewed(APP_STATE.auth.token, task.id);
    }
  }

  function renderTips() {
    const panel = document.getElementById('tipsPanel');
    const subjectConfig = getCurrentSubjectConfig();
    const topicConfig = getCurrentTopicConfig();
    const subtopics = getCurrentSubtopics();
    const subtopicLabel = getSelectedSubtopicLabel();
    const cards = [];

    cards.push({
      title: topicConfig ? topicConfig.label : 'Thema',
      text: topicConfig ? topicConfig.tip : 'Wähle ein Thema aus.'
    });

    if (subtopics && APP_STATE.subtopic && subtopics[APP_STATE.subtopic]) {
      cards.push({
        title: subtopics[APP_STATE.subtopic].label,
        text: subtopics[APP_STATE.subtopic].tip
      });
    }

    cards.push({
      title: 'Klassenbezug',
      text: subjectConfig.label + ' für Klasse ' + APP_STATE.classLevel + (subtopicLabel ? ' mit dem Unterthema ' + subtopicLabel + '.' : '.')
    });

    panel.innerHTML = '<div class="tip-stack">' + cards.map(function(card) {
      return '' +
        '<article class="tip-card">' +
        '<h3>' + escapeHtml(card.title) + '</h3>' +
        '<p class="tip-text">' + escapeHtml(card.text) + '</p>' +
        '</article>';
    }).join('') + '</div>';
  }

  function escapeHtml(value) {
    return String(value || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function escapeAttribute(value) {
    return escapeHtml(value);
  }

  function escapeJs(value) {
    return String(value || '')
      .replace(/\\/g, '\\\\')
      .replace(/'/g, "\\'");
  }

  document.addEventListener('DOMContentLoaded', function() {
    hydrateSettings();
    applyTheme();
    syncSelectedTopic();
    syncSelectedSubtopic();
    renderDashboard();
    renderSubjectCards();
    updateLabels();
    renderTasks();
    renderTips();
    renderProfileView();
    renderTeacherDashboard();
    goHome();
    updateHelpContext();
    updateAccountPreview();
    syncAuthUi();
    restoreAuthSession();
  });

  if (window.matchMedia) {
    const systemThemeMedia = window.matchMedia('(prefers-color-scheme: dark)');
    const syncSystemTheme = function() {
      if (APP_STATE.settings.themeMode === 'system') {
        applyTheme();
      }
    };

    if (systemThemeMedia.addEventListener) {
      systemThemeMedia.addEventListener('change', syncSystemTheme);
    } else if (systemThemeMedia.addListener) {
      systemThemeMedia.addListener(syncSystemTheme);
    }
  }

  document.addEventListener('click', function(event) {
    if (!event.target.closest('.custom-dropdown') && APP_STATE.openDropdown) {
      APP_STATE.openDropdown = '';
      renderDashboard();
    }
  });

  document.addEventListener('keydown', function(event) {
    if (event.key === 'Escape' && APP_STATE.openDropdown) {
      APP_STATE.openDropdown = '';
      renderDashboard();
      return;
    }

    if (event.key === 'Escape') {
      closeHelpChat();
      closeSettings();
    }
  });
</script>
